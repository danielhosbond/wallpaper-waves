<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wavy Wallpaper Creator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #f8f7f4;
    color: #1a1a1a;
    font-size: 13px;
  }

  /* TOPBAR */
  #topbar {
    height: 44px;
    background: #fff;
    border-bottom: 1px solid #e0ddd8;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    flex-shrink: 0;
    gap: 12px;
  }
  #topbar h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.2px;
    white-space: nowrap;
  }
  #topbar-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* MAIN LAYOUT */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* PANELS */
  .panel {
    width: 200px;
    flex-shrink: 0;
    background: #f8f7f4;
    border-right: 1px solid #e0ddd8;
    overflow-y: auto;
    overflow-x: hidden;
  }
  #right-panel {
    border-right: none;
    border-left: 1px solid #e0ddd8;
  }

  .panel-section {
    padding: 12px;
    border-bottom: 1px solid #e8e5e0;
  }
  .panel-section:last-child {
    border-bottom: none;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
    margin-bottom: 8px;
  }

  /* CANVAS AREA */
  #canvas-area {
    flex: 1;
    background: #e8e5e0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #preview-canvas {
    display: block;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
  }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 28px;
    padding: 0 12px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
    white-space: nowrap;
  }
  .btn-outline {
    background: transparent;
    border: 1px solid #c8c4be;
    color: #1a1a1a;
  }
  .btn-outline:hover {
    background: #f0ede8;
    border-color: #aaa;
  }
  .btn-dark {
    background: #1a1a1a;
    border: 1px solid #1a1a1a;
    color: #fff;
  }
  .btn-dark:hover {
    background: #333;
  }
  .btn-dark:disabled {
    background: #888;
    border-color: #888;
    cursor: not-allowed;
  }
  .btn-full {
    width: 100%;
    height: 30px;
    font-size: 12px;
  }

  /* RATIO BUTTONS */
  #ratio-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .ratio-btn {
    height: 26px;
    padding: 0 8px;
    font-size: 11px;
    background: transparent;
    border: 1px solid #c8c4be;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    color: #444;
    transition: all 0.1s;
  }
  .ratio-btn:hover {
    background: #f0ede8;
  }
  .ratio-btn.active {
    background: #f0ede8;
    border-color: #666;
    color: #1a1a1a;
    font-weight: 600;
  }

  /* SLIDERS */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .slider-row:last-child { margin-bottom: 0; }
  .slider-label {
    width: 80px;
    flex-shrink: 0;
    color: #555;
    font-size: 12px;
  }
  .slider-row input[type=range] {
    flex: 1;
    min-width: 0;
    height: 3px;
    accent-color: #1a1a1a;
    cursor: pointer;
  }
  .slider-value {
    width: 28px;
    text-align: right;
    font-size: 12px;
    color: #333;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }

  /* SHADOW TOGGLE */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .toggle-row input[type=checkbox] {
    width: 13px;
    height: 13px;
    accent-color: #1a1a1a;
    cursor: pointer;
    flex-shrink: 0;
    margin: 0;
  }
  .toggle-label {
    font-size: 12px;
    color: #555;
    cursor: pointer;
    user-select: none;
  }
  .shadow-sliders {
    padding-left: 8px;
    border-left: 2px solid #e0ddd8;
    margin-left: 2px;
    margin-bottom: 2px;
  }

  /* WAVE CONTROLS */
  .wave-group {
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid #eeebe6;
  }
  .wave-group:last-child {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }
  .wave-group-label {
    font-size: 11px;
    font-weight: 600;
    color: #666;
    margin-bottom: 6px;
  }

  /* COLOR SWATCHES */
  .swatch-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    cursor: pointer;
  }
  .swatch-row:last-child { margin-bottom: 0; }
  .swatch {
    width: 28px;
    height: 28px;
    border-radius: 5px;
    flex-shrink: 0;
    border: 1px solid rgba(0,0,0,0.12);
    cursor: pointer;
    transition: transform 0.1s;
  }
  .swatch:hover { transform: scale(1.08); }
  .swatch-label {
    font-size: 12px;
    color: #444;
    flex: 1;
  }
  .swatch-hex {
    font-size: 11px;
    color: #888;
    font-variant-numeric: tabular-nums;
    font-family: monospace;
  }

  /* PRESETS */
  #presets-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .preset-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border: 1px solid #c8c4be;
    border-radius: 5px;
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    color: #333;
    transition: all 0.1s;
  }
  .preset-btn:hover {
    background: #f0ede8;
    border-color: #aaa;
  }
  .preset-swatch-strip {
    display: flex;
    gap: 2px;
    flex: 1;
  }
  .preset-swatch-pip {
    flex: 1;
    height: 16px;
    border-radius: 2px;
  }
  .preset-name {
    width: 44px;
    text-align: right;
    flex-shrink: 0;
  }

  /* MOBILE TABS */
  #mobile-tabs {
    display: none;
    flex-shrink: 0;
    background: #fff;
    border-bottom: 1px solid #e0ddd8;
  }
  #mobile-tabs button {
    flex: 1;
    height: 44px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: #888;
    cursor: pointer;
    transition: color 0.1s, border-color 0.1s;
  }
  #mobile-tabs button.active {
    color: #1a1a1a;
    border-bottom-color: #1a1a1a;
  }

  @media (max-width: 700px) {
    body {
      height: 100svh;
    }
    #topbar {
      padding: 0 10px;
      gap: 6px;
    }
    #topbar h1 {
      font-size: 13px;
    }
    #topbar-actions {
      gap: 6px;
    }
    .json-sep, #import-json-btn, #export-json-btn {
      display: none;
    }
    #main {
      flex-direction: column;
    }
    #canvas-area {
      flex: none;
      height: 42svh;
      order: 1;
    }
    #mobile-tabs {
      display: flex;
      order: 2;
    }
    .panel {
      width: 100%;
      border-right: none;
      border-left: none;
      border-top: 1px solid #e0ddd8;
      flex: 1;
      order: 3;
      display: none;
    }
    .panel.active {
      display: block;
    }
    .slider-row {
      margin-bottom: 10px;
    }
    .slider-row input[type=range] {
      height: 28px;
    }
    .swatch {
      width: 36px;
      height: 36px;
    }
    .ratio-btn {
      height: 32px;
      padding: 0 10px;
    }
    .btn {
      height: 36px;
      font-size: 13px;
      padding: 0 14px;
    }
    .btn-full {
      height: 40px;
    }
    .preset-btn {
      padding: 8px 10px;
    }
    .toggle-row input[type=checkbox] {
      width: 18px;
      height: 18px;
    }
  }
</style>
</head>
<body>

<div id="topbar">
  <h1>Wavy Wallpaper Creator</h1>
  <div id="topbar-actions">
    <button class="btn btn-outline" id="reset-btn">Reset</button>
    <span class="json-sep" style="width:1px;height:20px;background:#e0ddd8;flex-shrink:0;"></span>
    <button class="btn btn-outline" id="import-json-btn">Import</button>
    <button class="btn btn-outline" id="export-json-btn">Export</button>
    <input type="file" id="import-json-input" accept=".json,application/json" style="display:none;">
    <span style="width:1px;height:20px;background:#e0ddd8;flex-shrink:0;"></span>
    <button class="btn btn-dark" id="export-btn">Export 8K PNG</button>
  </div>
</div>

<div id="main">
  <!-- LEFT PANEL -->
  <div class="panel active" id="left-panel">

    <div class="panel-section">
      <div class="section-label">Canvas Ratio</div>
      <div id="ratio-btns">
        <button class="ratio-btn active" data-ratio="16:9">16:9</button>
        <button class="ratio-btn" data-ratio="4:3">4:3</button>
        <button class="ratio-btn" data-ratio="1:1">1:1</button>
        <button class="ratio-btn" data-ratio="21:9">21:9</button>
        <button class="ratio-btn" data-ratio="9:16">9:16</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="section-label">Waves</div>
      <div class="slider-row">
        <span class="slider-label">Wave count</span>
        <input type="range" id="wave-count-slider" min="2" max="10" step="1" value="4">
        <span class="slider-value" id="wave-count-val">4</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">Smoothing</span>
        <input type="range" id="smoothing-slider" min="0" max="100" step="1" value="80">
        <span class="slider-value" id="smoothing-val">80</span>
      </div>
    </div>

    <div class="panel-section">
      <button class="btn btn-outline btn-full" id="randomize-btn">Randomize waves</button>
    </div>

    <div class="panel-section">
      <div class="section-label">Presets</div>
      <div id="presets-grid"></div>
    </div>

  </div>

  <!-- CANVAS AREA -->
  <div id="canvas-area">
    <canvas id="preview-canvas"></canvas>
  </div>

  <!-- MOBILE TABS -->
  <div id="mobile-tabs">
    <button class="active" data-panel="left">Controls</button>
    <button data-panel="right">Waves</button>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel" id="right-panel">

    <div class="panel-section">
      <div class="section-label">Wave Colors</div>
      <div id="color-swatches"></div>
    </div>

    <div class="panel-section">
      <div class="section-label">Wave Shape</div>
      <div id="wave-controls"></div>
    </div>

  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────

const EXPORT_DIMS = {
  '16:9': [7680, 4320],
  '4:3':  [5760, 4320],
  '1:1':  [4320, 4320],
  '21:9': [7560, 3240],
  '9:16': [4320, 7680],
};

const PRESETS = [
  {
    name: 'Sunset',
    waveCount: 4,
    waveColors: ['#E8543A', '#F0923A', '#E8C04A', '#2BAA8A', '#1A5068'],
  },
  {
    name: 'Ocean',
    waveCount: 4,
    waveColors: ['#A8D8F0', '#5AAAD8', '#2272B0', '#0A4880', '#061830'],
  },
  {
    name: 'Dusk',
    waveCount: 5,
    waveColors: ['#2B0A3D', '#5C1A6E', '#A0306A', '#E05840', '#F0A030', '#F8D070'],
  },
  {
    name: 'Forest',
    waveCount: 4,
    waveColors: ['#C8E8A0', '#78C060', '#389040', '#186030', '#0A3018'],
  },
  {
    name: 'Sand',
    waveCount: 3,
    waveColors: ['#F8E8C0', '#E8C070', '#C89040', '#805820'],
  },
  {
    name: 'Rose',
    waveCount: 4,
    waveColors: ['#FFF0F4', '#FDC8D8', '#F298B4', '#CC6890', '#944068'],
  },
  {
    name: 'Mint',
    waveCount: 4,
    waveColors: ['#EDFAF5', '#B8EDD8', '#78D0B0', '#3AA888', '#186858'],
  },
  {
    name: 'Peach',
    waveCount: 3,
    waveColors: ['#FFF7F0', '#FFD8B0', '#F4A878', '#C07040'],
  },
  {
    name: 'Lilac',
    waveCount: 5,
    waveColors: ['#F6EEFF', '#E0CAFE', '#C0A0F0', '#9870D0', '#6840A8', '#401878'],
  },
  {
    name: 'Meadow',
    waveCount: 4,
    waveColors: ['#F0FAF0', '#C8EEC0', '#90D488', '#50A858', '#207830'],
  },
  {
    name: 'Aurora',
    waveCount: 5,
    waveColors: ['#04080F', '#0A1A30', '#083848', '#0E7858', '#28C060', '#90F0A0'],
  },
  {
    name: 'Inferno',
    waveCount: 5,
    waveColors: ['#0C0400', '#380800', '#841008', '#CC3010', '#F07020', '#FCC030'],
  },
  {
    name: 'Abyss',
    waveCount: 5,
    waveColors: ['#020508', '#041020', '#083060', '#0A5888', '#18A0B0', '#70E0D0'],
  },
  {
    name: 'Ember',
    waveCount: 4,
    waveColors: ['#0A0808', '#3A1008', '#884028', '#D07830', '#F8C040'],
  },
  {
    name: 'Nebula',
    waveCount: 5,
    waveColors: ['#060408', '#180820', '#3A0848', '#800880', '#C830A8', '#F878C8'],
  },
];

function defaultState() {
  return {
    ratio: '16:9',
    waveCount: 4,
    waveColors: ['#E8543A', '#F0923A', '#E8C04A', '#2BAA8A', '#1A5068'],
    amplitude:   [0.12, 0.10, 0.09, 0.11],
    frequency:   [3, 4, 3, 5],
    phaseShift:  [0, 0.4, 1.1, 2.0],
    verticalPos: [0.20, 0.38, 0.55, 0.72],
    smoothing: 80,
    seed: 42,
    shadowEnabled: [true, true, true, true],
    shadowBlur:    [35, 35, 35, 35],
    shadowOpacity: [40, 40, 40, 40],
  };
}

let state = defaultState();

// ─── UTILS ───────────────────────────────────────────────────────────────────

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}

function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(v => Math.round(Math.max(0, Math.min(255, v))).toString(16).padStart(2,'0')).join('');
}

function lerpColor(hexA, hexB, t) {
  const [r1,g1,b1] = hexToRgb(hexA);
  const [r2,g2,b2] = hexToRgb(hexB);
  return rgbToHex(r1+(r2-r1)*t, g1+(g2-g1)*t, b1+(b2-b1)*t);
}

// Seeded pseudo-random
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

// ─── WAVE DRAW ────────────────────────────────────────────────────────────────

function catmullToBezier(points, smoothing) {
  const segments = [];
  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[Math.max(i - 1, 0)];
    const p1 = points[i];
    const p2 = points[i + 1];
    const p3 = points[Math.min(i + 2, points.length - 1)];
    const cp1x = p1.x + (p2.x - p0.x) * smoothing;
    const cp1y = p1.y + (p2.y - p0.y) * smoothing;
    const cp2x = p2.x - (p3.x - p1.x) * smoothing;
    const cp2y = p2.y - (p3.y - p1.y) * smoothing;
    segments.push({ cp1: {x: cp1x, y: cp1y}, cp2: {x: cp2x, y: cp2y}, end: p2 });
  }
  return segments;
}

function drawWaves(ctx, cw, ch, st) {
  const smoothFactor = (st.smoothing / 100) * 0.5;

  // Fill background
  ctx.fillStyle = st.waveColors[0];
  ctx.fillRect(0, 0, cw, ch);

  // Draw waves top to bottom — wave 0 first (highest position),
  // each subsequent wave overwrites the lower portion, revealing color stripes
  for (let i = 0; i < st.waveCount; i++) {
    const baseline = ch * st.verticalPos[i];
    const amp = ch * st.amplitude[i];
    const freq = st.frequency[i];
    const phase = st.phaseShift[i];

    const N = Math.max(40, Math.ceil(cw / 4) + 2);
    const points = [];

    for (let j = 0; j < N; j++) {
      const t_norm = j / (N - 1);
      const x = t_norm * cw;
      const t = t_norm * freq * Math.PI * 2 + phase;
      let y = baseline + Math.sin(t) * amp;
      // Second harmonic for organic feel
      y += Math.sin(t * 1.618 + phase * 0.7) * amp * 0.3;
      points.push({x, y});
    }

    // Compute bezier segments once — reused for fill and shadow stroke
    const segs = smoothFactor >= 0.005 ? catmullToBezier(points, smoothFactor) : null;

    // Draw filled wave (closed path to canvas bottom)
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    if (segs) {
      for (const seg of segs) ctx.bezierCurveTo(seg.cp1.x, seg.cp1.y, seg.cp2.x, seg.cp2.y, seg.end.x, seg.end.y);
    } else {
      for (let j = 1; j < points.length; j++) ctx.lineTo(points[j].x, points[j].y);
    }
    ctx.lineTo(cw, ch);
    ctx.lineTo(0, ch);
    ctx.closePath();
    ctx.fillStyle = st.waveColors[i + 1];
    ctx.fill();

    // Shadow: stroke the open wave crest line with a downward canvas shadow.
    // The shadow appears just below the crest (inside the visible band).
    // The next wave's fill naturally clips the shadow at the band boundary.
    if (st.shadowEnabled && st.shadowEnabled[i]) {
      const blurPx = (st.shadowBlur[i] / 100) * ch * 0.07;
      ctx.save();
      ctx.shadowColor = `rgba(0,0,0,${st.shadowOpacity[i] / 100})`;
      ctx.shadowBlur = blurPx;
      ctx.shadowOffsetY = blurPx * 0.55;
      ctx.shadowOffsetX = 0;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      if (segs) {
        for (const seg of segs) ctx.bezierCurveTo(seg.cp1.x, seg.cp1.y, seg.cp2.x, seg.cp2.y, seg.end.x, seg.end.y);
      } else {
        for (let j = 1; j < points.length; j++) ctx.lineTo(points[j].x, points[j].y);
      }
      ctx.strokeStyle = st.waveColors[i + 1];
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();
    }
  }
}

// ─── PREVIEW CANVAS ──────────────────────────────────────────────────────────

const previewCanvas = document.getElementById('preview-canvas');
const previewCtx = previewCanvas.getContext('2d');
const canvasArea = document.getElementById('canvas-area');

function getPreviewDimensions() {
  const [ew, eh] = EXPORT_DIMS[state.ratio];
  const aspectRatio = ew / eh;

  const areaW = canvasArea.clientWidth - 48;
  const areaH = canvasArea.clientHeight - 48;

  let pw = areaW;
  let ph = pw / aspectRatio;

  if (ph > areaH) {
    ph = areaH;
    pw = ph * aspectRatio;
  }

  return [Math.floor(pw), Math.floor(ph)];
}

function redraw() {
  const [pw, ph] = getPreviewDimensions();
  previewCanvas.width = pw;
  previewCanvas.height = ph;
  previewCanvas.style.width = pw + 'px';
  previewCanvas.style.height = ph + 'px';
  drawWaves(previewCtx, pw, ph, state);
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────

document.getElementById('export-btn').addEventListener('click', function() {
  const btn = this;
  btn.textContent = 'Exporting…';
  btn.disabled = true;

  // Use setTimeout to allow UI to update before heavy canvas work
  setTimeout(() => {
    const [ew, eh] = EXPORT_DIMS[state.ratio];
    const offscreen = document.createElement('canvas');
    offscreen.width = ew;
    offscreen.height = eh;
    const octx = offscreen.getContext('2d');
    drawWaves(octx, ew, eh, state);

    offscreen.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'wavy-wallpaper-8k.png';
      a.click();
      URL.revokeObjectURL(url);
      btn.textContent = 'Export 8K PNG';
      btn.disabled = false;
    }, 'image/png');
  }, 20);
});

// ─── RESET ────────────────────────────────────────────────────────────────────

document.getElementById('reset-btn').addEventListener('click', () => {
  state = defaultState();
  syncAllUI();
  redraw();
});

// ─── IMPORT / EXPORT JSON ────────────────────────────────────────────────────

document.getElementById('export-json-btn').addEventListener('click', () => {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'wavy-wallpaper.json';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('import-json-btn').addEventListener('click', () => {
  document.getElementById('import-json-input').click();
});

document.getElementById('import-json-input').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      // Basic validation
      if (
        typeof parsed.waveCount !== 'number' ||
        !Array.isArray(parsed.waveColors) ||
        !Array.isArray(parsed.amplitude) ||
        !Array.isArray(parsed.frequency) ||
        !Array.isArray(parsed.phaseShift) ||
        !Array.isArray(parsed.verticalPos) ||
        parsed.waveColors.length !== parsed.waveCount + 1 ||
        parsed.amplitude.length !== parsed.waveCount
      ) {
        alert('Invalid wallpaper JSON file.');
        return;
      }
      // Fill in shadow arrays if missing (for files saved before shadow feature)
      if (!Array.isArray(parsed.shadowEnabled)) parsed.shadowEnabled = Array(parsed.waveCount).fill(true);
      if (!Array.isArray(parsed.shadowBlur))    parsed.shadowBlur    = Array(parsed.waveCount).fill(35);
      if (!Array.isArray(parsed.shadowOpacity)) parsed.shadowOpacity = Array(parsed.waveCount).fill(40);
      Object.assign(state, parsed);
      syncAllUI();
      redraw();
    } catch {
      alert('Could not parse JSON file.');
    }
  };
  reader.readAsText(file);
  // Reset so the same file can be re-imported if needed
  this.value = '';
});

// ─── RATIO BUTTONS ───────────────────────────────────────────────────────────

document.getElementById('ratio-btns').addEventListener('click', e => {
  const btn = e.target.closest('.ratio-btn');
  if (!btn) return;
  document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.ratio = btn.dataset.ratio;
  redraw();
});

// ─── WAVE COUNT ──────────────────────────────────────────────────────────────

document.getElementById('wave-count-slider').addEventListener('input', function() {
  const newCount = parseInt(this.value);
  document.getElementById('wave-count-val').textContent = newCount;
  adjustWaveCount(newCount);
  buildRightPanel();
  redraw();
});

function adjustWaveCount(newCount) {
  const old = state.waveCount;

  if (newCount > old) {
    // Add waves
    for (let i = old; i < newCount; i++) {
      // Color: lerp from last two existing colors
      const len = state.waveColors.length;
      const newColor = len >= 2
        ? lerpColor(state.waveColors[len-2], state.waveColors[len-1], 1.5)
        : '#888888';
      state.waveColors.push(newColor);

      // Shape defaults
      state.amplitude.push(0.10);
      state.frequency.push(i % 2 === 0 ? 3 : 4);
      state.phaseShift.push(Math.random() * Math.PI * 2);
      state.shadowEnabled.push(true);
      state.shadowBlur.push(35);
      state.shadowOpacity.push(40);

      // Vertical pos: spread new waves between last existing pos and 0.90
      const lastPos = state.verticalPos[state.verticalPos.length - 1] || 0.72;
      const remaining = newCount - old;
      const step = (0.90 - lastPos) / (remaining + 1);
      state.verticalPos.push(lastPos + step * (i - old + 1));
    }
  } else if (newCount < old) {
    // Remove waves
    state.waveColors.splice(newCount + 1);
    state.amplitude.splice(newCount);
    state.frequency.splice(newCount);
    state.phaseShift.splice(newCount);
    state.verticalPos.splice(newCount);
    state.shadowEnabled.splice(newCount);
    state.shadowBlur.splice(newCount);
    state.shadowOpacity.splice(newCount);
  }

  state.waveCount = newCount;
}

// ─── SMOOTHING ────────────────────────────────────────────────────────────────

document.getElementById('smoothing-slider').addEventListener('input', function() {
  state.smoothing = parseInt(this.value);
  document.getElementById('smoothing-val').textContent = this.value;
  redraw();
});

// ─── RANDOMIZE ────────────────────────────────────────────────────────────────

document.getElementById('randomize-btn').addEventListener('click', () => {
  state.seed++;
  const rand = seededRandom(state.seed);
  for (let i = 0; i < state.waveCount; i++) {
    state.amplitude[i] = 0.06 + rand() * 0.10; // 0.06–0.16
    state.frequency[i] = Math.floor(rand() * 5) + 2; // 2–6
    state.phaseShift[i] = rand() * Math.PI * 2;
  }
  syncWaveShapeControls();
  redraw();
});

// ─── PRESETS ─────────────────────────────────────────────────────────────────

function buildPresets() {
  const container = document.getElementById('presets-grid');
  container.innerHTML = '';

  PRESETS.forEach((preset, idx) => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';

    const strip = document.createElement('div');
    strip.className = 'preset-swatch-strip';
    preset.waveColors.forEach(color => {
      const pip = document.createElement('div');
      pip.className = 'preset-swatch-pip';
      pip.style.background = color;
      strip.appendChild(pip);
    });

    const nameSpan = document.createElement('span');
    nameSpan.className = 'preset-name';
    nameSpan.textContent = preset.name;

    btn.appendChild(strip);
    btn.appendChild(nameSpan);

    btn.addEventListener('click', () => applyPreset(preset));
    container.appendChild(btn);
  });
}

function applyPreset(preset) {
  state.waveCount = preset.waveCount;
  state.waveColors = [...preset.waveColors];

  // Reset shape to sensible defaults for the given waveCount
  state.amplitude = [];
  state.frequency = [];
  state.phaseShift = [];
  state.verticalPos = [];
  state.shadowEnabled = [];
  state.shadowBlur = [];
  state.shadowOpacity = [];

  for (let i = 0; i < preset.waveCount; i++) {
    state.amplitude.push(0.06 + (i % 3) * 0.025);
    state.frequency.push(i % 2 === 0 ? 3 : 4);
    state.phaseShift.push(i * 0.55);
    state.verticalPos.push(0.18 + (i / (preset.waveCount - 1 || 1)) * 0.60);
    state.shadowEnabled.push(true);
    state.shadowBlur.push(35);
    state.shadowOpacity.push(40);
  }

  syncAllUI();
  redraw();
}

// ─── RIGHT PANEL ─────────────────────────────────────────────────────────────

function buildRightPanel() {
  buildColorSwatches();
  buildWaveControls();
}

function buildColorSwatches() {
  const container = document.getElementById('color-swatches');
  container.innerHTML = '';

  for (let i = 0; i <= state.waveCount; i++) {
    const label = i === 0 ? 'Background' : `Wave ${i}`;
    const color = state.waveColors[i];

    const row = document.createElement('div');
    row.className = 'swatch-row';

    const swatch = document.createElement('div');
    swatch.className = 'swatch';
    swatch.style.background = color;

    // Hidden color input
    const colorInput = document.createElement('input');
    colorInput.type = 'color';
    colorInput.value = color;
    colorInput.style.cssText = 'position:absolute;opacity:0;width:0;height:0;pointer-events:none;';
    colorInput.addEventListener('input', function() {
      state.waveColors[i] = this.value;
      swatch.style.background = this.value;
      hexSpan.textContent = this.value.toUpperCase();
      redraw();
    });

    swatch.addEventListener('click', () => colorInput.click());

    const labelSpan = document.createElement('span');
    labelSpan.className = 'swatch-label';
    labelSpan.textContent = label;

    const hexSpan = document.createElement('span');
    hexSpan.className = 'swatch-hex';
    hexSpan.textContent = color.toUpperCase();

    row.appendChild(swatch);
    row.appendChild(colorInput);
    row.appendChild(labelSpan);
    row.appendChild(hexSpan);

    row.addEventListener('click', e => {
      if (e.target !== colorInput) colorInput.click();
    });

    container.appendChild(row);
  }
}

function buildWaveControls() {
  const container = document.getElementById('wave-controls');
  container.innerHTML = '';

  for (let i = 0; i < state.waveCount; i++) {
    const group = document.createElement('div');
    group.className = 'wave-group';

    const groupLabel = document.createElement('div');
    groupLabel.className = 'wave-group-label';
    groupLabel.textContent = `Wave ${i + 1}`;
    group.appendChild(groupLabel);

    // Amplitude
    group.appendChild(makeSliderRow(
      'Amplitude',
      1, 25, 1,
      Math.round(state.amplitude[i] * 100),
      val => {
        state.amplitude[i] = val / 100;
        redraw();
      }
    ));

    // Frequency
    group.appendChild(makeSliderRow(
      'Frequency',
      1, 8, 1,
      state.frequency[i],
      val => {
        state.frequency[i] = val;
        redraw();
      }
    ));

    // Position
    group.appendChild(makeSliderRow(
      'Position',
      5, 95, 1,
      Math.round(state.verticalPos[i] * 100),
      val => {
        state.verticalPos[i] = val / 100;
        redraw();
      },
      '%'
    ));

    // Shadow toggle
    const toggleRow = document.createElement('div');
    toggleRow.className = 'toggle-row';
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.id = `shadow-toggle-${i}`;
    checkbox.checked = state.shadowEnabled[i];
    const toggleLabel = document.createElement('label');
    toggleLabel.htmlFor = `shadow-toggle-${i}`;
    toggleLabel.className = 'toggle-label';
    toggleLabel.textContent = 'Shadow';
    toggleRow.appendChild(checkbox);
    toggleRow.appendChild(toggleLabel);
    group.appendChild(toggleRow);

    // Shadow sliders (shown/hidden by toggle)
    const shadowSliders = document.createElement('div');
    shadowSliders.className = 'shadow-sliders';
    shadowSliders.style.display = state.shadowEnabled[i] ? '' : 'none';

    shadowSliders.appendChild(makeSliderRow(
      'Blur', 0, 100, 1,
      state.shadowBlur[i],
      val => { state.shadowBlur[i] = val; redraw(); }
    ));
    shadowSliders.appendChild(makeSliderRow(
      'Opacity', 0, 100, 1,
      state.shadowOpacity[i],
      val => { state.shadowOpacity[i] = val; redraw(); },
      '%'
    ));

    checkbox.addEventListener('change', function() {
      state.shadowEnabled[i] = this.checked;
      shadowSliders.style.display = this.checked ? '' : 'none';
      redraw();
    });

    group.appendChild(shadowSliders);
    container.appendChild(group);
  }
}

function makeSliderRow(label, min, max, step, value, onChange, unit = '') {
  const row = document.createElement('div');
  row.className = 'slider-row';

  const labelEl = document.createElement('span');
  labelEl.className = 'slider-label';
  labelEl.textContent = label;

  const slider = document.createElement('input');
  slider.type = 'range';
  slider.min = min;
  slider.max = max;
  slider.step = step;
  slider.value = value;

  const valueEl = document.createElement('span');
  valueEl.className = 'slider-value';
  valueEl.textContent = value + unit;

  slider.addEventListener('input', function() {
    const v = parseInt(this.value);
    valueEl.textContent = v + unit;
    onChange(v);
  });

  row.appendChild(labelEl);
  row.appendChild(slider);
  row.appendChild(valueEl);

  return row;
}

// ─── SYNC UI FROM STATE ───────────────────────────────────────────────────────

function syncAllUI() {
  // Ratio buttons
  document.querySelectorAll('.ratio-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.ratio === state.ratio);
  });

  // Wave count slider
  const wcSlider = document.getElementById('wave-count-slider');
  wcSlider.value = state.waveCount;
  document.getElementById('wave-count-val').textContent = state.waveCount;

  // Smoothing slider
  const smSlider = document.getElementById('smoothing-slider');
  smSlider.value = state.smoothing;
  document.getElementById('smoothing-val').textContent = state.smoothing;

  buildRightPanel();
}

function syncWaveShapeControls() {
  // Re-render the wave shape sliders in the right panel to reflect new values
  buildWaveControls();
}

// ─── MOBILE TABS ─────────────────────────────────────────────────────────────

document.getElementById('mobile-tabs').addEventListener('click', e => {
  const btn = e.target.closest('button[data-panel]');
  if (!btn) return;
  const panel = btn.dataset.panel;
  document.querySelectorAll('#mobile-tabs button').forEach(b => b.classList.toggle('active', b === btn));
  document.getElementById('left-panel').classList.toggle('active', panel === 'left');
  document.getElementById('right-panel').classList.toggle('active', panel === 'right');
});

// ─── RESIZE OBSERVER ─────────────────────────────────────────────────────────

const resizeObserver = new ResizeObserver(() => redraw());
resizeObserver.observe(canvasArea);

// ─── INIT ─────────────────────────────────────────────────────────────────────

buildPresets();
syncAllUI();
redraw();
</script>
</body>
</html>
